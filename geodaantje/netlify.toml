[build]
  publish = "public"
  functions = "functions"

# Redirect API requests to our functions
[[redirects]]
  from = "/api/maps-proxy"
  to = "/.netlify/functions/maps-proxy"
  status = 200
  
[[redirects]]
  from = "/api/streetview-proxy"
  to = "/.netlify/functions/streetview-proxy"
  status = 200

# Handle all other routes by serving the index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
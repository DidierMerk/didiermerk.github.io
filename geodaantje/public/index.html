<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Daantje!</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Landing Page -->
    <div id="landing-page" class="page active">
        <div class="svg-background">
            <!-- SVG background will be generated by JS -->
        </div>
        <div class="content">
            <h1 class="birthday-title">Happy Birthday<br><span>Daantje!</span></h1>
            <p class="subtitle">I made a special game just for you!</p>
            <button id="start-button" class="primary-button">Start Quiz</button>
        </div>
    </div>

    <!-- Street View Page -->
    <div id="streetview-page" class="page">
        <div id="street-view" class="street-view-container"></div>
        <div class="game-ui-top">
            <div class="round-indicator">
                <span id="current-round">1</span>/<span id="total-rounds">6</span>
            </div>
        </div>
        <div class="game-ui-bottom">
            <button id="guess-button" class="primary-button">Guess</button>
        </div>
        <div class="loading-overlay">
            <div class="loader"></div>
        </div>
    </div>

    <!-- Map Guess Page -->
    <div id="map-page" class="page">
        <div id="map" class="map-container"></div>
        <div class="map-ui-top">
            <button id="back-to-view" class="secondary-button">Back to View</button>
        </div>
        <div class="map-ui-bottom">
            <button id="confirm-guess" class="primary-button disabled">Confirm Guess</button>
        </div>
    </div>

    <!-- Result Page -->
    <div id="result-page" class="page">
        <div class="svg-background">
            <!-- SVG background will be generated by JS -->
        </div>
        <div class="result-container">
            <div id="correct-result" class="result-box correct">
                <h2>Correct!</h2>
                <p>You were <span id="correct-distance-value">0</span> kilometers away.</p>
                <div class="hint-container">
                    <h3>Your hint:</h3>
                    <div id="hint-value" class="hint-value">1</div>
                </div>
            </div>
            
            <div id="incorrect-result" class="result-box incorrect">
                <h2>Not Quite!</h2>
                <p>You were <span id="distance-value">0</span> kilometers away.</p>
                <p>Try better next time!</p>
            </div>
            
            <button id="next-location" class="primary-button">Next Location</button>
        </div>
    </div>

    <!-- Final Results Page -->
    <div id="final-results-page" class="page">
        <div class="svg-background">
            <!-- SVG background will be generated by JS -->
        </div>
        <div class="game-complete-screen">
            <h2>Game Complete!</h2>
            
            <div id="location-thumbnails" class="location-grid">
                <!-- Will be filled by JavaScript -->
            </div>
            
            <div class="hints-section">
                <h3>Collected Hints:</h3>
                <div id="collected-hints" class="collected-hints"></div>
            </div>
            
            <div class="final-message">
                <p>Bedankt voor het spelen, Daantje!</p>
                <p>Tijd om je cadeau te vinden! ❤️</p>
            </div>
        </div>
    </div>

    <!-- Load Maps API via our proxy -->
    <script>
        function loadMapsAPI() {
            const script = document.createElement('script');
            script.src = '/api/maps-proxy?callback=initApp';
            script.async = true;
            script.defer = true;
            document.body.appendChild(script);
        }
        
        // Load the Maps API when the page is ready
        document.addEventListener('DOMContentLoaded', loadMapsAPI);
    </script>
    
    <!-- Application Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/locations.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

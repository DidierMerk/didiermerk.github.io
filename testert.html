<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beatle - The Musical Maze</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
    <div class="mobile-container">
        <header>
            <i class="fas fa-bars menu-icon"></i>
            <div class="title">D | Puzzles</div>
            <i class="fas fa-cog settings-icon"></i>
        </header>
        
        <div class="slogan" style="display: none;">
            <strong>Connect the notes to find the hidden songs!</strong>
        </div>
        
        <main>
            <div class="game-info">
                <img src="logo.png" alt="Beatle Logo" class="game-logo">
                <h1>Beatle</h1>
                <p>Find the hidden paths and attempt to uncover today's beats.</p>
                <button id="play-button">Play</button>
            </div>
            <div class="game-content" style="display: none;">
                <div class="game-area">
                    <div class="grid-container"></div>
                </div>
                <div class="game-controls">
                    <button id="hint-button" data-hint-state="0">Hint</button>
                    <div class="score-counter">0 of 5 songs found</div>
                </div>
            </div>
        </main>
        
        <footer>
            <div class="footer-wrapper">
                <div class="footer-content">
                    <div class="date"></div>
                    <div>Puzzle by <a href="https://didiermerk.github.io" target="_blank">Didier Merk</a></div>
                </div>
            </div>
        </footer>

        <div id="game-end-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <span class="back-to-puzzle">Back to puzzle</span>
                    <span class="close">&times;</span>
                </div>
                <h2 class="modal-title">Well Done!</h2>
                <div class="modal-body">
                    <p class="date-info">
                        <span id="current-date"></span><br>
                        "Escape the police"
                    </p>
                    <div class="result-square"></div>
                    <p class="congratulations">
                        Nice job finding the theme songs and Spangram. You are amazing!
                    </p>
                    <p class="next-puzzle-text">NEXT PUZZLE IN</p>
                    <div id="countdown-timer"></div>
                    <button id="share-results">Share Your Results</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

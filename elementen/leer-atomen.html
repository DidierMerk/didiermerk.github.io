<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leer de Atomen</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">

  <!-- Dedicated CSS for "Leer de Atomen" -->
  <link rel="stylesheet" href="css/leer-atomen.css">
</head>
<body>
  <!-- Starry Background -->
  <div class="background-container">
    <div class="stars"></div>
    <div class="twinkling"></div>
    <div class="overlay"></div>
  </div>

  <main class="game-container">
    <!-- Countdown Screen -->
    <div class="countdown-container" id="countdownContainer">
      <h2 class="countdown-text">Game Starting in...</h2>
      <h1 id="countdownNumber">3</h1>
    </div>

    <!-- Quiz Screen -->
    <div class="quiz-container hidden" id="quizContainer">
      <div id="timer" class="timer">00:00</div>
      <div id="questionText" class="question-text">Voorbeeld Vraag</div>
      
      <!-- If the question has an image, show it here -->
      <img id="questionImage" class="hidden question-image" src="" alt="Vraag afbeelding" />

      <!-- Single input + feedback approach (like "Leer Elementen") -->
      <div class="answer-section">
        <div class="input-group">
          <!-- Notice: we ALLOW ANY characters, so no pattern restriction. -->
          <input 
            type="text"
            id="answerInput"
            class="futuristic-input quiz-input"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            placeholder="Typ je antwoord..."
          />
          <button id="submitAnswerBtn" class="futuristic-button quiz-submit">OK</button>
        </div>
        <div id="feedback" class="feedback hidden"></div>
      </div>
    </div>

    <!-- Results Screen -->
    <div class="results-container hidden" id="resultsContainer">
      <div class="results-card">
        <h1 class="results-title" id="finalHeading">Goed gedaan!</h1>
        <div class="results-info">
          <p id="finalTime" class="result-stat">Tijd: ...</p>
        </div>

        <!-- Bar Chart -->
        <div class="dist-chart-wrapper">
          <h3 class="chart-title" id="chartTitle"></h3>
          <div class="dist-chart-container" id="mistakesDistribution"></div>
        </div>

        <button id="backToMenuBtn" class="futuristic-button results-button">
          Terug naar Menu
        </button>
      </div>
    </div>
  </main>

  <!-- JS for "Leer de Atomen" -->
  <script src="js/leer-atomen.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e2cd"/>
      <stop offset="100%" stop-color="#8a2be2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="16" cy="16" r="15" fill="#0a1120" stroke="url(#logoGradient)" stroke-width="1"/>
  
  <!-- Electron Orbits -->
  <ellipse cx="16" cy="16" rx="12" ry="6" fill="none" stroke="url(#logoGradient)" stroke-width="0.5" opacity="0.6" transform="rotate(30 16 16)"/>
  <ellipse cx="16" cy="16" rx="12" ry="6" fill="none" stroke="url(#logoGradient)" stroke-width="0.5" opacity="0.6" transform="rotate(90 16 16)"/>
  <ellipse cx="16" cy="16" rx="12" ry="6" fill="none" stroke="url(#logoGradient)" stroke-width="0.5" opacity="0.6" transform="rotate(150 16 16)"/>
  
  <!-- Nucleus -->
  <circle cx="16" cy="16" r="4" fill="url(#logoGradient)" filter="url(#glow)"/>
  
  <!-- Electrons -->
  <circle cx="24" cy="14" r="1.5" fill="#00e2cd" filter="url(#glow)"/>
  <circle cx="12" cy="22" r="1.5" fill="#8a2be2" filter="url(#glow)"/>
  <circle cx="10" cy="10" r="1.5" fill="#00e2cd" filter="url(#glow)"/>
</svg>
